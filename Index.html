<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner to Google Sheet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
            background-color: #f4f4f9;
        }
        #reader {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: green;
        }
        .loading {
            color: orange;
        }
    </style>
</head>
<body>

    <h2>QUÉT MÃ QR & LƯU GOOGLE SHEET</h2>
    <div id="reader"></div>
    <div id="result">Sẵn sàng quét...</div>

    <script>
        // Đường dẫn đến Google Apps Script của bạn
        const googleAppScriptUrl = "https://script.google.com/macros/s/AKfycbydM6TU3co4bvcDpLcJzqkWVuwjWmshq1klq87It9wDVEZjk_fBmnolkyHyFa-f7uCL/exec"; 

        function onScanSuccess(decodedText, decodedResult) {
            // Tạm dừng quét để xử lý dữ liệu tránh trùng lặp
            html5QrcodeScanner.clear();
            
            document.getElementById('result').innerHTML = `<span class="loading">Đang gửi dữ liệu: ${decodedText}...</span>`;

            // Gửi dữ liệu lên Google Sheet qua API Fetch
            fetch(googleAppScriptUrl, {
                method: "POST",
                mode: "no-cors", // Bắt buộc phải có để tránh lỗi CORS với Google Script
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ qrContent: decodedText })
            })
            .then(() => {
                document.getElementById('result').innerHTML = `🎉 Đã lưu thành công: <b>${decodedText}</b>`;
                // Khởi động lại camera sau 3 giây để quét tiếp
                setTimeout(startScanner, 3000);
            })
            .catch(error => {
                console.error("Lỗi:", error);
                document.getElementById('result').innerHTML = "❌ Lỗi gửi dữ liệu!";
                setTimeout(startScanner, 3000);
            });
        }

        function onScanFailure(error) {
            // Có thể bỏ qua lỗi này vì camera sẽ liên tục quét lỗi cho đến khi thấy mã rõ ràng
        }

        function startScanner() {
            window.html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", { fps: 10, qrbox: { width: 250, height: 250 } }
            );
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        // Chạy trình quét khi trang web tải xong
        startScanner();
    </script>
</body>
</html>
